<!DOCTYPE html>
<html>
<head>
  <title>Мій сайт</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 300px;
    }

    img {
      width: 150px;
      border-radius: 50%;
      border: 4px solid #4facfe;
    }

    h1 {
      margin: 10px 0;
    }

    p {
      color: gray;
    }

    a {
      display: block;
      color: blue;
      text-decoration: none;
      margin-top: 5px;
    }

    a:hover {
      color: darkblue;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      background: linear-gradient(to right, blue, purple);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>

</head>
<body>

  <div class="card">
    <img src="photo.png" alt="Фото">

    <h1>Олег</h1>
    <p>Я починаю веб-розробку 🚀</p>

    <a href="https://www.instagram.com/olegshatarskii/" target="_blank">
      Мій Instagram
    </a>

    <a href="https://t.me/" target="_blank">
      Мій Telegram
    </a>

    <button onclick="showMessage()">Написати мені</button>
  </div>

  <script>
    function showMessage() {
      alert("Скоро тут буде форма зв'язку 😎");
    }
  </script>

</body>
</html>
